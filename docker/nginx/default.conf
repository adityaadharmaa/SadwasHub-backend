# Aturan 1: Paksa HTTP berubah menjadi HTTPS
server {
    listen 80;
    server_name api.sadewascoliving.cloud;
    return 301 https://$host$request_uri;
}

# Aturan 2: Terima koneksi aman HTTPS
server {
    listen 443 ssl;
    server_name api.sadewascoliving.cloud;

    # Beri tahu Nginx letak sertifikatnya
    ssl_certificate /etc/letsencrypt/live/api.sadewascoliving.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sadewascoliving.cloud/privkey.pem;

    root /var/www/public;
    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}