services:
  # 1. Service Aplikasi (Laravel/PHP-FPM)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadewashub_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - sadewashub_net
    depends_on:
      - db

  # 2. Service Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: sadewashub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      # - "443:443" # Baris ini akan kita buka nanti saat memasang SSL/HTTPS
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sadewashub_net
    depends_on:
      - app

  # 3. Service Database (MySQL 8)
  db:
    image: mysql:8.0
    container_name: sadewashub_db
    restart: unless-stopped
    environment:
      # Mengambil nilai dari file .env di server
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sadewashub_net

  # 4. Service Laravel Queue Worker (Background Jobs)
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadewashub_queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work
    volumes:
      - ./:/var/www
    networks:
      - sadewashub_net
    depends_on:
      - db

  # 5. Service Laravel Reverb (WebSocket / Real-time)
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadewashub_reverb
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan reverb:start --host="0.0.0.0" --port="8080"
    ports:
      - "8080:8080" 
    volumes:
      - ./:/var/www
    networks:
      - sadewashub_net
    depends_on:
      - db

networks:
  sadewashub_net:
    driver: bridge

volumes:
  db_data: