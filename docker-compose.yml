
services:
  # 1. Service Aplikasi (Laravel/PHP)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadewashub_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - sadewashub_net

  # 2. Service Web Server (Nginx)
  web:
    image: nginx:alpine
    container_name: sadewashub_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sadewashub_net

  # 3. Service Database (MySQL)
  db:
    image: mysql:8.0
    container_name: sadewashub_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_sadewashub
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: secret
      MYSQL_USER: sadewas_user
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - sadewashub_net

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadewashub_queue
    restart: unless-stopped
    working_dir: /var/www
    # Ini perintah yang dijalankan container saat menyala
    command: php artisan queue:work
    volumes:
      - ./:/var/www
    networks:
      - sadewashub_net
    depends_on:
      - db

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sadewashub_reverb
    restart: unless-stopped
    working_dir: /var/www
    # Jalankan server Reverb pada port 8080
    command: php artisan reverb:start --host="0.0.0.0" --port="8080"
    ports:
      - "8080:8080" # Buka port ini agar Frontend React bisa konek
    volumes:
      - ./:/var/www
    networks:
      - sadewashub_net
    depends_on:
      - db

networks:
  sadewashub_net:
    driver: bridge

# Volume ini menjaga agar data MySQL tidak hilang saat container dimatikan
volumes:
  db_data: